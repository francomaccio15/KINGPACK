name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend (TypeScript check + compile)
        working-directory: frontend
        env:
          API_URL_INTERNAL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_URL: http://76.13.112.206
        run: npm run build

      - name: Deploy to VPS
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.112.206
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/KINGPACK
            git pull --ff-only
            cd backend && npm install --omit=dev --no-audit --no-fund && node db/runner.js && cd ..
            cd frontend && rm -rf .next && npm install --no-audit --no-fund && npm run build && cd ..
            pm2 restart ecosystem.config.js --update-env
            pm2 save
            sleep 2
            curl -fsS http://127.0.0.1:3001/api/health