name: CI — Build check

# El DEPLOY ya NO se hace desde acá. Los runners de GitHub Actions no siempre
# alcanzan el puerto 22 del VPS (la red del proveedor bloquea de forma
# intermitente las IPs de los runners → "dial tcp ...:22: i/o timeout"), así que
# el push por SSH era poco confiable.
#
# El deploy real lo hace el propio VPS por PULL: un timer de systemd
# (kingpack-deploy.timer) chequea GitHub cada minuto y, si master avanzó, hace
# pull + build + restart. Ver deploy/auto-deploy.sh y deploy/README.md.
#
# Este workflow queda solo como verificación: compila el frontend (incluye el
# chequeo de TypeScript) en cada push a master para avisar rápido si algo no
# compila ANTES de que el VPS lo despliegue.

on:
  push:
    branches: [master]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build frontend (TypeScript check + compile)
        working-directory: frontend
        env:
          API_URL_INTERNAL: http://127.0.0.1:3001
          NEXT_PUBLIC_API_URL: http://76.13.112.206
        run: npm run build
